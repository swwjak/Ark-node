<!DOCTYPE html>
<html>
<head>
    <title>Forge Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: monospace; background: #0a0a1a; color: #ccc; padding: 15px; max-width: 700px; margin: 0 auto; }
        h1 { color: #ff6600; font-size: 20px; margin-bottom: 10px; }
        h2 { color: #00aaff; font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 5px; margin: 15px 0 10px; }
        .section { background: #111; padding: 12px; margin: 8px 0; border-radius: 4px; border: 1px solid #333; }
        .item { padding: 8px; margin: 4px 0; border-radius: 3px; cursor: pointer; }
        .item:hover { opacity: 0.8; }
        .image-item { background: #0e1a0e; border-left: 3px solid #00ff88; }
        .drive-item { background: #1a1a2e; border-left: 3px solid #00ff88; }
        .drive-item.dangerous { border-left-color: #ff4444; }
        .drive-item.selected, .image-item.selected { border-left-color: #ff6600; background: #2a1a0e; }
        .warning { color: #ff4444; }
        .ok { color: #00ff88; }
        button { padding: 10px 20px; background: #ff6600; color: #000; border: none; cursor: pointer; font-family: monospace; margin: 5px 5px 5px 0; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        input { background: #000; color: #ff6600; border: 1px solid #ff6600; padding: 10px; font-family: monospace; width: 100%; margin: 5px 0; }
        .log { background: #000; padding: 8px; max-height: 150px; overflow-y: scroll; font-size: 11px; white-space: pre-wrap; }
        #status { color: #00aaff; font-size: 12px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>&#9874; Forge Console</h1>
    <p id="status">Loading...</p>
    
    <div class="section">
        <h2>&#128193; Images</h2>
        <div id="images">Loading...</div>
    </div>
    
    <div class="section">
        <h2>&#128190; Drives</h2>
        <div id="drives">Loading...</div>
    </div>
    
    <div class="section hidden" id="flash-section">
        <h2>&#9889; Flash</h2>
        <p>Image: <span id="sel-image" class="ok"></span></p>
        <p>Target: <span id="sel-drive"></span></p>
        <p id="danger-msg" class="warning"></p>
        <p>Type the device path to confirm:</p>
        <input type="text" id="confirm" placeholder="Type: FLASH /dev/sdX">
        <br>
        <button id="flash-btn" disabled>FLASH</button>
        <button onclick="cancelFlash()">Cancel</button>
    </div>
    
    <div class="section">
        <h2>&#128220; Logs</h2>
        <button onclick="refreshLogs()">Refresh</button>
        <div class="log" id="logs">Loading...</div>
    </div>
    
    <script>
        let selImg = null, selDrv = null;
        
        function init() {
            refresh();
            setInterval(refresh, 5000);
        }
        
        function refresh() {
            fetch('/api/status').then(r=>r.json()).then(d => {
                document.getElementById('status').textContent = 'OK - ' + d.images + ' images, port ' + d.port;
            }).catch(() => {
                document.getElementById('status').textContent = 'ERROR - Cannot reach server';
            });
            refreshImages();
            refreshDrives();
            refreshLogs();
        }
        
        function refreshImages() {
            fetch('/api/images').then(r=>r.json()).then(data => {
                let h = '';
                if (!data.length) h = '<p>No images in /tmp</p>';
                data.forEach(img => {
                    const sel = selImg === img.path ? 'selected' : '';
                    const raw_label = img.raw ? '<span class="ok">[RAW]</span>' : '<span class="warning">[COMPRESSED - will not boot]</span>';
                    h += `<div class="item image-item ${sel}" onclick="selImage('${img.path}','${img.name}','${img.size_human}',${img.raw})">
                        <b>${img.name}</b> <span style="color:#666">(${img.size_human})</span> ${raw_label}
                    </div>`;
                });
                document.getElementById('images').innerHTML = h;
            });
        }
        
        function refreshDrives() {
            fetch('/api/drives').then(r=>r.json()).then(data => {
                let h = '';
                if (!data.length) h = '<p>No removable drives</p>';
                data.forEach(d => {
                    const sel = selDrv === d.path ? 'selected' : '';
                    const dang = d.dangerous ? 'dangerous' : '';
                    const mnt = d.mounted.length ? `<span class="warning">MOUNTED: ${d.mounted.join(', ')}</span>` : '<span class="ok">Safe</span>';
                    h += `<div class="item drive-item ${dang} ${sel}" onclick="selDrive('${d.path}','${d.name}','${d.size}','${d.model}',${d.dangerous},'${d.dangerous_reason || ''}')">
                        <b>/dev/${d.name}</b> &mdash; ${d.size} &mdash; ${d.model}<br>${mnt}
                    </div>`;
                });
                document.getElementById('drives').innerHTML = h;
            });
        }
        
        function refreshLogs() {
            fetch('/api/logs').then(r=>r.text()).then(t => {
                document.getElementById('logs').textContent = t || 'No logs';
            }).catch(() => {});
        }
        
        function selImage(path, name, size, raw) {
            selImg = path;
            document.getElementById('sel-image').textContent = name + ' (' + size + ')';
            if (!raw) {
                document.getElementById('danger-msg').textContent = '⚠ COMPRESSED IMAGE - will not boot! Use .img file.';
            } else {
                document.getElementById('danger-msg').textContent = '';
            }
            checkReady();
        }
        
        function selDrive(path, name, size, model, dangerous, reason) {
            selDrv = path;
            document.getElementById('sel-drive').textContent = '/dev/' + name + ' — ' + size + ' — ' + model;
            document.getElementById('danger-msg').textContent = dangerous ? '⚠ ' + reason : '';
            checkReady();
        }
        
        function checkReady() {
            if (selImg && selDrv) {
                document.getElementById('flash-section').classList.remove('hidden');
            }
        }
        
        function cancelFlash() {
            selImg = null; selDrv = null;
            document.getElementById('flash-section').classList.add('hidden');
            document.getElementById('confirm').value = '';
            document.getElementById('flash-btn').disabled = true;
        }
        
        document.getElementById('confirm').addEventListener('input', function() {
            document.getElementById('flash-btn').disabled = this.value !== 'FLASH ' + selDrv;
        });
        
        document.getElementById('flash-btn').addEventListener('click', function() {
            // Check if image is raw
            if (selImg && !selImg.endsWith('.img')) {
                alert('Cannot flash compressed image! Select the .img file.');
                return;
            }
            if (!confirm('Destroy all data on ' + selDrv + '?')) return;
            fetch('/api/flash', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({image: selImg, target: selDrv, confirm: 'FLASH ' + selDrv})
            }).then(r=>r.json()).then(d => {
                alert(d.message);
                cancelFlash();
                refreshLogs();
            });
        });
        
        init();
    </script>
</body>
</html>
